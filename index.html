<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarde Valluna - Invitación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Great+Vibes&display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#1a1a1a] text-white overflow-x-hidden antialiased">

    <div
        class="max-w-md mx-auto min-h-screen relative shadow-2xl flex flex-col bg-gradient-to-b from-[#f29f05] via-[#d94a11] to-[#8c1c04]">

        <div class="fixed inset-0 opacity-100 bg-cover bg-center z-0 pointer-events-none"
            style="background-image: url('assets/fondo-textura.png');"></div>






        <header class="relative z-10 w-full flex flex-col items-center text-center">
            <div class="relative w-full">

                <img src="assets/focos_y banderitas.png" alt="" class="absolute inset-0 z-0 w-full object-contain">

                <img src="assets/banderitas_1.png" alt="" class="relative z-10 w-full h-auto">

                <img src="assets/tarde valluna_.png" alt="Tarde Valluna" class="absolute z-20 w-full top-10 left-0">

                <img src="assets/logo wiñay.png" alt="Logo Wiñay"
                    class="relative hover:scale-110 z-30 block mx-auto mt-[180px] w-[350px] drop-shadow-2xl transition-all duration-300">

                <div class="relative z-40 flex justify-center mt-[50px]">

                    <button
                        class="bg-amber-500 hover:scale-110 hover:-rotate-2 hover:text-white text-amber-200 font-mono text-2xl py-4 px-12 rounded-2xl border border-amber-400 shadow-3xl transition-all duration-300 transform active:scale-90 ">
                        INVITACIÓN
                    </button>
                </div>



            </div>


        </header>

        <main class="relative z-10 flex-grow">

            <div class="relative z-40 mt-12 px-4">
                <p class="text-center text-white/80 uppercase tracking-[0.2em] text-xs mb-4 font-bold">Faltan para
                    la gran fiesta:</p>

                <div class="flex justify-center gap-4 text-center">
                    <div class="bg-black/40 backdrop-blur-md rounded-xl p-3 min-w-[70px] border border-white/10">
                        <span id="days" class="block text-3xl font-black text-[#FFD700]">00</span>
                        <span class="text-[10px] uppercase opacity-60">Días</span>
                    </div>
                    <div class="bg-black/40 backdrop-blur-md rounded-xl p-3 min-w-[70px] border border-white/10">
                        <span id="hours" class="block text-3xl font-black text-[#FFD700]">00</span>
                        <span class="text-[10px] uppercase opacity-60">Horas</span>
                    </div>
                    <div class="bg-black/40 backdrop-blur-md rounded-xl p-3 min-w-[70px] border border-white/10">
                        <span id="minutes" class="block text-3xl font-black text-[#FFD700]">00</span>
                        <span class="text-[10px] uppercase opacity-60">Min</span>
                    </div>
                </div>
            </div>

            <section id="#integrantes"></section>

            <img src="assets/integrantes del grupo.png" alt="">

            <div class="max-w-xs mx-auto text-center">
                <h3 class="text-white font-bold mb-4 uppercase tracking-[0.2em] text-sm">
                    Confirma tu asistencia aquí:
                </h3>

                <a href="https://wa.me/15712835489?text=¡Hola!%20Quiero%20confirmar%20mi%20asistencia%20para%20la%20Tarde%20Valluna%20del%20Sábado""
                    target=" _blank"
                    class="flex items-center justify-center space-x-3 w-full bg-[#25D366] hover:bg-[#1fb355] text-white py-4 rounded-2xl font-black text-xl shadow-[0_10px_20px_rgba(37,211,102,0.3)] transition-all duration-300 transform active:scale-95 border">



                    <span>ENVIAR WHATSAPP</span>
                </a>


            </div>

            <img src="assets/lugar.png" alt="">

            <div class="absolute left-1/2 -translate-x-1/2">

                <a href="https://maps.google.com/?q=39.065034815492716, -76.94254490296552" target="_blank"
                    class="flex items-center justify-center w-full bg-orange-800 hover:bg-amber-500 hover:scale-110 text-white hover:text-amber-800 border py-4 rounded-2xl font-black text-xl shadow-xl transition-all duration-300 transform active:scale-95 p-6 ">

                    <svg class="w-7 h-7 " viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
                            fill="#4285F4" />
                    </svg>

                    <span>UBICACIÓN</span>
                </a>

            </div>

            <br>
            <br>

            <img src="assets/PROGRMA.png" alt="">





        </main>

        <footer id="confirmar" class="flex items-center justify-center italic z-10 p-20">

            @2026 Ritter Albany

        </footer>

    </div>

    <script>
        // Configura la fecha del evento: Sábado 11 de Abril 2026, 10:00 AM
        const eventDate = new Date('April 11, 2026 10:00:00').getTime();

        const updateCountdown = setInterval(function () {
            const now = new Date().getTime();
            const distance = eventDate - now;

            // Cálculos de tiempo
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

            // Inyectar en el HTML
            document.getElementById('days').innerText = d < 10 ? '0' + d : d;
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;

            // Si la fecha ya pasó
            if (distance < 0) {
                clearInterval(updateCountdown);
                document.getElementById('days').innerText = "00";
                document.getElementById('hours').innerText = "00";
                document.getElementById('minutes').innerText = "00";
            }
        }, 1000);
    </script>
</body>

</html>
